<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExímIA Ventures | Strategic Intelligence for Leaders</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Strategic intelligence that amplifies yours. Consulting, technology, and corporate education for leaders who demand measurable results." />
    <meta name="keywords" content="strategic consulting, AI consulting, operational excellence, corporate education, executive intelligence, business transformation" />
    <meta name="author" content="ExímIA Ventures" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eximiaventures.com.br/" />
    <meta property="og:title" content="ExímIA Ventures | Strategic Intelligence for Leaders" />
    <meta property="og:description" content="Consulting, technology, and corporate education that turns data into executive decisions and decisions into compounding results." />
    <meta property="og:image" content="https://eximiaventures.com.br/og-image.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ExímIA Ventures | Strategic Intelligence for Leaders" />
    <meta name="twitter:description" content="Consulting, technology, and corporate education that turns data into executive decisions." />
    <meta name="twitter:image" content="https://eximiaventures.com.br/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://eximiaventures.com.br/" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

    <!-- Brandbook Fonts: Playfair Display (Serif), Inter (Sans), JetBrains Mono (Code) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              /* ── Core Surfaces ── */
              "bg-core":  "#0A0A0A",
              "bg-card":  "#111111",
              "bg-float": "#1A1A1A",
              "bg-overlay": "#222222",

              /* ── Border Scale ── */
              "edge":       "#2A2A2A",
              "edge-light": "#3A3A3A",
              "edge-hover": "#4A4A4A",

              /* ── Text Scale ── */
              "cream":     "#E8E0D5",
              "cream-dim": "#B8B0A5",
              "dim":       "#666666",

              /* ── Accent: Warm Brown (Primary) ── */
              "accent":       "#C4A882",
              "accent-dim":   "#8B7355",
              "accent-hover": "#D4BC9A",

              /* ── Sage: Green (Secondary) ── */
              "sage":       "#7C9E8F",
              "sage-dim":   "#5A7A6B",
              "sage-hover": "#8CB09F",

              /* ── Atom: Periwinkle (Tertiary) ── */
              "atom":       "#8B9CC4",
              "atom-dim":   "#6B7CA4",
              "atom-hover": "#A0B0D4",

              /* ── Semantic ── */
              "success": "#22C55E",
              "warning": "#F59E0B",
              "error":   "#EF4444",
              "info":    "#3B82F6",
            },
            fontFamily: {
              "serif": ["Playfair Display", "Georgia", "serif"],
              "sans":  ["Inter", "system-ui", "sans-serif"],
              "mono":  ["JetBrains Mono", "monospace"],
            },
            animation: {
              'fade-in':     'fadeIn 0.8s ease-out forwards',
              'fade-in-up':  'fadeInUp 0.8s ease-out forwards',
              'pulse-slow':  'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%':   { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%':   { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #0A0A0A;
        color: #E8E0D5;
        font-family: 'Inter', system-ui, sans-serif;
        overflow-x: hidden;
      }

      html {
        scroll-behavior: smooth;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0A0A0A; }
      ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #C4A882; }

      /* ── Glass Panel (Brandbook) ── */
      .glass-panel {
        background: rgba(17, 17, 17, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(232, 224, 213, 0.05);
        border-radius: 16px;
      }

      /* ── Glass Pill (Navbar) ── */
      .glass-pill {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(232, 224, 213, 0.08);
      }

      /* ── Text Gradient (Brandbook) ── */
      .text-gradient {
        background: linear-gradient(to right, #E8E0D5, #C4A882);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Material Symbols */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }

      /* 3D Transform Utils */
      .perspective-1000 { perspective: 1000px; }
      .rotate-x-12 { transform: rotateX(12deg); }
      .rotate-x-0 { transform: rotateX(0deg); }

      /* Reduced Motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
