    <style>
      body {
        background-color: #0A0A0A;

      html { scroll-behavior: smooth; }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0A0A0A; }
      ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #C4A882; }

      /* ── Glass Panel ── */
      .glass-panel {
        background: rgba(17, 17, 17, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(232, 224, 213, 0.05);
        border-radius: 16px;
      }

      /* ── Glass Pill ── */
      .glass-pill {
        background: rgba(10, 10, 10, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(232, 224, 213, 0.08);
      }

      /* ── Text Gradient ── */
      .text-gradient {
        background: linear-gradient(135deg, #E8E0D5 0%, #C4A882 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Scroll Reveal ── */
      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.7s ease-out, transform 0.7s ease-out;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .reveal-delay-1 { transition-delay: 0.1s; }
      .reveal-delay-2 { transition-delay: 0.2s; }
      .reveal-delay-3 { transition-delay: 0.3s; }
      .reveal-delay-4 { transition-delay: 0.4s; }
      .reveal-delay-5 { transition-delay: 0.5s; }

      /* ── Hover Lift ── */
      .hover-lift {
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease;
      }
      .hover-lift:hover {
        transform: translateY(-6px);
      }

      /* ── Number Counter Animation ── */
      .counter-value {
        font-variant-numeric: tabular-nums;
      }

      /* ── Marquee ── */
      .marquee-track {
        display: flex;
        width: max-content;
      }

      /* Material Symbols */

        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }

      /* 3D */
      .perspective-1000 { perspective: 1000px; }
      .rotate-x-12 { transform: rotateX(12deg); }
      .rotate-x-0 { transform: rotateX(0deg); }

      /* Reduced Motion */
      @media (prefers-reduced-motion: reduce) {

          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .reveal { opacity: 1; transform: none; }
      }
    </style>
    <script type="importmap">

  <body>
    <div id="root"></div>

    <!-- Scroll Reveal Observer -->
    <script>
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      // Observe after React mounts
      const startObserving = () => {
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      };
      // Re-observe on route changes (MutationObserver)
      const mo = new MutationObserver(() => {
        document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
      });
      window.addEventListener('DOMContentLoaded', () => {
        startObserving();
        mo.observe(document.getElementById('root'), { childList: true, subtree: true });
      });
    </script>

    <!-- Sync html lang with selected language -->
    <script>
      // Sync html lang with selected language
      const langMap = { EN: 'en', PT: 'pt-BR', ES: 'es', IT: 'it' };
      const updateLang = () => {
        const stored = localStorage.getItem('eximia-lang');
        if (stored && langMap[stored]) {
          document.documentElement.lang = langMap[stored];
        }
      };
      updateLang();
      window.addEventListener('storage', updateLang);
      // Also observe for SPA changes
      const langObs = new MutationObserver(updateLang);
      langObs.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
